base_model:
  id: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  device_map: auto

# SFT adapter baked into the base before DPO; the merged SFT model is BOTH the
# DPO policy init AND the frozen reference (ref_model=None -> adapter-disabled
# model == SFT). Override per-run with --sft_adapter.
sft_adapter: ../phase0_sft/weights/sft-qwen7b

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
